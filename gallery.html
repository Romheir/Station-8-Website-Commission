<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station 8 | Event Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <div class="brand-icon"></div>
            Station <span>8</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="spaces.html">Spaces</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
            <li><a href="booking.html">Booking</a></li>
        </ul>
        <button class="cyber-btn" onclick="window.location.href='booking.html'">Secure Venue</button>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <section class="gallery-section">
        <div class="section-header reveal">
            <h2 class="main-title">Moments Made <span>Beautiful</span></h2>
            <p class="subtitle">A visual showcase of our signature event setups.</p>
        </div>

        <div class="photo-grid">
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1511556532299-8f662fc26c06?auto=format&fit=crop&w=800&q=80" alt="Event Styling" class="gallery-image"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?auto=format&fit=crop&w=800&q=80" alt="Corporate Setup" class="gallery-image"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=800&q=80" alt="Wedding Setup" class="gallery-image"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1530103862676-de8892b0701f?auto=format&fit=crop&w=800&q=80" alt="Birthday Bash" class="gallery-image"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329?auto=format&fit=crop&w=800&q=80" alt="Social Gathering" class="gallery-image"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=800&q=80" alt="Event Details" class="gallery-image"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1478146896981-b80fe463b330?auto=format&fit=crop&w=800&q=80" alt="Lighting Decor" class="gallery-image"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=800&q=80" alt="Live Event" class="gallery-image"></div>
        </div>
    </section>

    <div id="lightbox" class="lightbox-modal">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Enlarged Event Photo">
    </div>

    <script src="script.js"></script>
</body>
</html>
